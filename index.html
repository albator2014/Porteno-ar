:root{--bg:#07071A;--cd:rgba(255,255,255,0.04);--bd:rgba(255,255,255,0.08);--tx:#E8E8F0;--mt:rgba(255,255,255,0.4);--c1:#FF3D6B;--c2:#00D4FF;--c3:#FFB830;--c4:#9B5DE5;--c5:#00F5D4;--c6:#FF6B35}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:'Plus Jakarta Sans',sans-serif;line-height:1.5}
#app{display:flex;flex-direction:column;height:100dvh;max-width:430px;margin:0 auto;position:relative;overflow:hidden}
#main{flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden}
/* min-height: 0 est VITAL ici pour autoriser le scroll interne sur flex:1 */
.scr{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:85px;opacity:0;transform:translateY(8px);animation:sIn .3s ease forwards}
.scr::-webkit-scrollbar{display:none}
@keyframes sIn{to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes bounceIn{0%{transform:scale(0)}55%{transform:scale(1.15)}100%{transform:scale(1)}}
@keyframes pulse2{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes flagWave{0%{transform:rotate(-6deg) scale(1)}25%{transform:rotate(6deg) scale(1.05)}50%{transform:rotate(-4deg) scale(1)}75%{transform:rotate(5deg) scale(1.03)}100%{transform:rotate(-6deg) scale(1)}}
.flag-anim{display:inline-block;animation:flagWave 3s ease-in-out infinite;transform-origin:50% 60%}
.flag-hero{display:inline-block;animation:bounceIn .5s cubic-bezier(.2,.8,.3,1.2) both,flagWave 3s .6s ease-in-out infinite;transform-origin:50% 60%}
.fu{animation:fadeUp .3s ease both}.pi{animation:popIn .25s ease both}.bi{animation:bounceIn .5s cubic-bezier(.2,.8,.3,1.2) both}.pu{animation:pulse2 .7s infinite}

nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(7,7,26,.97);backdrop-filter:blur(20px);border-top:1px solid var(--bd);display:flex;z-index:200;padding:8px 0 env(safe-area-inset-bottom,12px)}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;border:none;background:none;color:var(--mt);font-size:10px;font-family:inherit;font-weight:700;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;padding:8px 2px;transition:color .25s}
.nb.on{color:var(--c2)}
.nb svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.nb .dot{width:4px;height:4px;border-radius:50%;background:var(--c2);opacity:0;transition:opacity .25s;margin-top:2px}
.nb.on .dot{opacity:1}

#toast{position:fixed;top:56px;left:50%;transform:translateX(-50%) translateY(-120px);background:rgba(0,245,212,.15);border:1px solid var(--c5);color:var(--c5);padding:14px 22px;border-radius:16px;font-weight:700;font-size:14px;z-index:999;transition:transform .35s cubic-bezier(.4,0,.2,1);white-space:nowrap;max-width:90%;backdrop-filter:blur(12px)}
#toast.show{transform:translateX(-50%) translateY(0)}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:400;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(8px)}
.modal-box{background:#12122E;border:1px solid var(--bd);border-radius:24px;padding:32px 24px;max-width:320px;width:100%;text-align:center}
.modal-box h3{font-family:'Syne',sans-serif;font-size:20px;margin-bottom:10px}
.modal-box p{font-size:15px;color:var(--mt);margin-bottom:24px;line-height:1.5}
.modal-btns{display:flex;gap:12px}
.modal-btns button{flex:1;padding:16px;border-radius:14px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;border:none}
.mbtn-c{background:rgba(255,255,255,.08);color:var(--tx)}
.mbtn-ok{background:linear-gradient(135deg,var(--c2),var(--c1));color:#fff}

.card{background:var(--cd);border:1px solid var(--bd);border-radius:20px;padding:20px}
.bar-bg{background:rgba(255,255,255,.08);border-radius:999px;overflow:hidden}
.bar-fill{height:100%;border-radius:999px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.hd{font-family:'Syne',sans-serif;letter-spacing:0.02em}

.speak-btn{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:14px;border:1.5px solid rgba(0,212,255,.35);background:rgba(0,212,255,.08);color:var(--c2);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
.speak-btn:active{transform:scale(.95)}

.chip{padding:12px 18px;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;border:1px solid transparent;transition:all .15s;font-family:inherit}
.chip.pool{background:rgba(255,255,255,.07);color:var(--tx);border-color:rgba(255,255,255,.1)}
.chip.placed{background:rgba(0,212,255,.14);color:var(--c2);border-color:rgba(0,212,255,.3)}
.chip:active{transform:scale(.94)}

.btn{padding:18px 24px;border-radius:16px;border:none;font-family:'Syne',sans-serif;font-size:16px;font-weight:700;cursor:pointer;color:#fff;background:linear-gradient(135deg,var(--c2),var(--c1));transition:transform .1s;width:100%}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.5;cursor:default}

.tab{flex-shrink:0;padding:12px 18px;border-radius:14px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--bd);background:var(--cd);color:var(--mt);transition:all .2s;font-family:inherit;white-space:nowrap}
.tab.on{color:#07071A;border-color:transparent;font-weight:700}

.quiz-opt{padding:16px 20px;border-radius:16px;border:1.5px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);font-size:15px;cursor:pointer;text-align:left;font-family:inherit;color:var(--tx);font-weight:500;transition:all .18s;width:100%;display:block;margin-bottom:10px}
.quiz-opt:active:not(:disabled){transform:scale(.98)}
.quiz-opt:disabled{cursor:default}
.quiz-opt.ok{background:rgba(0,245,212,.14)!important;border-color:var(--c5)!important;color:var(--c5)!important;font-weight:700}
.quiz-opt.ko{background:rgba(255,61,107,.14)!important;border-color:var(--c1)!important;color:var(--c1)!important}

.bubble{display:flex;gap:12px;margin-bottom:16px;align-items:flex-start}
.bubble.me{flex-direction:row-reverse}
.bav{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.btxt{padding:12px 18px;border-radius:18px;font-size:15px;font-weight:500;line-height:1.5;margin-bottom:6px}
.bubble.me .btxt{border-radius:18px 18px 4px 18px;background:rgba(0,212,255,.14);border:1px solid rgba(0,212,255,.28)}
.bubble.them .btxt{border-radius:18px 18px 18px 4px;background:rgba(155,93,229,.14);border:1px solid rgba(155,93,229,.28)}
.bfr{font-size:12px;color:var(--mt);padding:0 6px}

.wcard{background:var(--cd);border:1px solid var(--bd);border-radius:16px;padding:16px;margin-bottom:8px;cursor:pointer;transition:all .15s}
.wcard:active{transform:scale(.99)}
.wcard .lvl{font-size:10px;padding:4px 8px;border-radius:8px;font-weight:700}
.wcard .exp{margin-top:10px;padding-top:10px;border-top:1px solid var(--bd);font-size:14px;color:rgba(255,255,255,.6);font-style:italic;line-height:1.4}

.search-input{width:100%;padding:16px 20px;border-radius:16px;border:1px solid var(--bd);background:rgba(255,255,255,.05);color:var(--tx);font-size:16px;font-family:inherit;outline:none}
.search-input:focus{border-color:rgba(0,212,255,.4)}

.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cat-item{background:var(--cd);border:1px solid var(--bd);border-radius:16px;padding:16px;cursor:pointer;transition:all .15s}
.cat-item:active{transform:scale(.97)}

.fc{border-radius:24px;padding:36px 24px;min-height:240px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;cursor:pointer;border:1.5px solid var(--bd);background:rgba(255,255,255,.03);transition:border-color .3s}
.fc:active{transform:scale(.97)}

.diff-row{display:flex;gap:10px}
.diff-btn{flex:1;padding:14px 6px;border-radius:14px;border:1px solid transparent;background:var(--cd);font-size:22px;cursor:pointer;text-align:center;transition:all .15s;font-family:inherit}
.diff-btn:active{transform:scale(.92)}

let _audioCtx=null;
function getAudioCtx(){if(!_audioCtx)_audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(_audioCtx.state==='suspended')_audioCtx.resume();return _audioCtx}
function sfx(t){try{const c=getAudioCtx(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);if(t==='ok'){o.type='sine';o.frequency.setValueAtTime(440,c.currentTime);o.frequency.exponentialRampToValueAtTime(880,c.currentTime+.1);g.gain.setValueAtTime(.08,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.15);o.start();o.stop(c.currentTime+.15)}else if(t==='ko'){o.type='triangle';o.frequency.setValueAtTime(220,c.currentTime);o.frequency.exponentialRampToValueAtTime(140,c.currentTime+.2);g.gain.setValueAtTime(.08,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.2);o.start();o.stop(c.currentTime+.2)}else{o.type='sine';o.frequency.setValueAtTime(660,c.currentTime);g.gain.setValueAtTime(.04,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.04);o.start();o.stop(c.currentTime+.05)}}catch(e){}}

const _aud=document.createElement('audio');
_aud.id='tts-player';
_aud.setAttribute('playsinline','');
_aud.setAttribute('webkit-playsinline','');
_aud.preload='auto';
document.body.appendChild(_aud);

let _ttsReady=false;
let _voices=[];

function initV(){
  if(window.speechSynthesis){
    const ld=()=>{_voices=speechSynthesis.getVoices()};
    ld();speechSynthesis.onvoiceschanged=ld;
  }
  try{_aud.load()}catch(e){}
  _ttsReady=true;
}

function ttsUrl(text){
  const t=encodeURIComponent((text||'').substring(0,200));
  return 'https://translate.googleapis.com/translate_tts?ie=UTF-8&tl=es&client=gtx&q='+t;
}

function spk(text){
  if(!text)return;
  try{
    _aud.pause();
    _aud.src=ttsUrl(text);
    const p=_aud.play();
    if(p&&p.catch){
      p.catch(function(err){
        spkSynth(text);
      });
    }
    return;
  }catch(e){}
  spkSynth(text);
}

function spkSynth(text){
  if(!window.speechSynthesis||!text)return;
  try{speechSynthesis.cancel()}catch(e){}
  try{
    const u=new SpeechSynthesisUtterance(text);
    u.lang='es-AR';u.rate=0.85;u.volume=1.0;
    if(!_voices.length)_voices=speechSynthesis.getVoices();
    const priorities=['es-AR','es-419','es-MX','es-ES','es'];
    for(const lang of priorities){const v=_voices.find(x=>x.lang&&x.lang.startsWith(lang));if(v){u.voice=v;break}}
    speechSynthesis.speak(u);
  }catch(e){}
}

let dicoCat=null,dicoSearch='',dicoLvl='all';
function renderDico(){
let content='';
const filtered=getFilteredWords();
if(dicoCat||dicoSearch.length>=2){
  const words=filtered.slice(0,120);
  let list=words.map(w=>wordCardH(w)).join('');
  if(filtered.length>120)list+=`<p style="color:var(--mt);font-size:13px;text-align:center;padding:16px">Affine ta recherche (${filtered.length} résultats)</p>`;
  content=`${dicoCat?`<button class="tab on" style="margin-bottom:14px;background:var(--c2)" onclick="dicoCat=null;dicoSearch='';renderDico()">← Retour aux Catégories</button>`:''}
  <div style="font-size:13px;color:var(--mt);margin-bottom:10px">${filtered.length} résultat${filtered.length>1?'s':''}</div>${list}`;
}else{
  const cats=V.map(c=>{const cnt=dicoLvl==='all'?c.w.length:c.w.filter(w=>(w.n||'A1')===dicoLvl).length;
  return cnt?`<div class="cat-item" onclick="dicoCat='${c.id}';renderDico()"><div style="font-size:14px;font-weight:700;line-height:1.3;margin-bottom:4px">${c.l}</div><div style="font-size:11px;color:var(--mt)">${cnt} mots</div></div>`:''}).join('');
  content=`<div class="cat-grid">${cats}</div>`;
}

<div style="display:flex;gap:6px;padding:0 16px 14px;overflow-x:auto" class="hs">${['all','A1','A2','B1'].map(l=>`<button class="tab${dicoLvl===l?' on':''}" style="${dicoLvl===l?'background:var(--c2);':''}" onclick="dicoLvl='${l}';renderDico()">${l==='all'?'Tous':l}</button>`).join('')}</div>
<div style="padding:0 16px">${content}</div></div>`}

function getFilteredWords(){
let words=[];
if(dicoCat){const c=V.find(x=>x.id===dicoCat);if(c)words=c.w.map(w=>({...w,cat:c.l}))}
else if(dicoSearch.length>=2){const q=dicoSearch.toLowerCase();V.forEach(c=>{c.w.forEach(w=>{if(w.e.toLowerCase().includes(q)||w.f.toLowerCase().includes(q))words.push({...w,cat:c.l})})})}
if(dicoLvl!=='all')words=words.filter(w=>(w.n||'A1')===dicoLvl);
return words}

function wordCardH(w){
  const nv=w.n||'A1';
  const bgN=nv==='B1'?'rgba(155,93,229,.15)':nv==='A2'?'rgba(255,184,48,.15)':'rgba(0,245,212,.15)';
  const cN=nv==='B1'?'var(--c4)':nv==='A2'?'var(--c3)':'var(--c5)';
  return `<div class="wcard" onclick="const wx=this.querySelector('.wexp'); wx.style.display=(wx.style.display==='none'||wx.style.display==='')?'block':'none'"><div style="display:flex;justify-content:space-between;align-items:center"><div><span style="font-weight:700;color:var(--c2);font-size:16px">${w.e}</span><span style="color:var(--mt);font-size:13px;margin-left:10px">${w.f}</span></div><span class="lvl" style="background:${bgN};color:${cN}">${nv}</span></div><div class="wexp" style="display:none">${w.x?`<div class="exp">"${w.x}"</div>`:''}<button class="speak-btn" style="margin-top:10px;padding:8px 14px;font-size:12px" onclick="event.stopPropagation();spk('${esc(w.x||w.e)}')">🔊 Écouter</button></div></div>`
}

function startSpeed(){
  spdOn=true;spdSc=0;spdTl=15;genSpd();
  showPrContent(); 
  clearInterval(spdTimer);
  spdTimer=setInterval(()=>{
    spdTl--;
    if(spdTl<=0){
      clearInterval(spdTimer);
      spdOn=false;
      if(spdSc>S.sb){S.sb=spdSc;save()}
      if(spdSc>0)addXP(spdSc*5);
      showPrContent(); 
    } else {
      // Mise à jour douce via le DOM
      const tEl=document.getElementById('spd-time');
      const bEl=document.getElementById('spd-bar');
      if(tEl){
        tEl.textContent=spdTl+'s';
        if(spdTl<5){tEl.style.color='var(--c1)';tEl.classList.add('pu');}
      }
      if(bEl){bEl.style.width=(spdTl/15*100)+'%';}
    }
  },1000);
}

function genSpd(){const w=AW[Math.floor(Math.random()*AW.length)];const wr=AW.filter(x=>x.f!==w.f).sort(()=>Math.random()-.5).slice(0,3);spdQ={w:w.e,a:w.f,opts:[...wr.map(x=>x.f),w.f].sort(()=>Math.random()-.5)};spdFb=null}

function pickSpeed(btn,chosen,ans){
  if(spdFb)return;
  const ok=chosen===ans;
  btn.classList.add(ok?'ok':'ko');
  if(ok){
    spdSc++;sfx('ok');hap();spdFb='ok';
    const scEl=document.getElementById('spd-sc');
    if(scEl)scEl.textContent=spdSc;
    setTimeout(()=>{genSpd();showPrContent()},300);
  }else{
    sfx('ko');hap(60);spdTl=Math.max(0,spdTl-3);spdFb='ko';
    const tEl=document.getElementById('spd-time');
    const bEl=document.getElementById('spd-bar');
    if(tEl){tEl.textContent=spdTl+'s';if(spdTl<5){tEl.style.color='var(--c1)';tEl.classList.add('pu');}}
    if(bEl){bEl.style.width=(spdTl/15*100)+'%';}
    setTimeout(()=>{spdFb=null;btn.classList.remove('ko')},500);
  }
}

const prec=S.qT?Math.round(S.qC/S.qT*100):0,seen=Object.keys(S.ws||{}).length;
const skills=[{n:'Vocabulaire',v:Math.min(100,Math.round(seen/AW.length*100)),c:'var(--c1)'},{n:'Écoute',v:Math.min(100,S.done.length*6),c:'var(--c2)'},{n:'Grammaire',v:Math.min(100,S.done.length*6),c:'var(--c4)'},{n:'Lunfardo',v:Math.min(100,(S.done.includes(4)?30:0)+(S.done.includes(16)?30:0)+S.done.length*2),c:'var(--c3)'},{n:'Conversation',v:Math.min(100,DL.filter(d=>isDone(d.u)).length*10),c:'var(--c5)'}];
const hard=Object.entries(S.ws||{}).filter(([,v])=>(v.h||0)>(v.e||0)).slice(0,8);
document.getElementById('main').innerHTML=`<div class="scr"><div style="padding:50px 16px 24px">
<h2 class="hd" style="font-size:24px;font-weight:800;margin-bottom:6px">📈 Progression</h2>
<div style="color:var(--mt);font-size:14px;margin-bottom:18px;letter-spacing:0.01em">Niv. ${lv.n} · ${lv.t} · ${seen}/${AW.length} mots vus</div>
<div class="card" style="margin-bottom:14px;padding:18px"><div style="display:flex;justify-content:space-between;margin-bottom:10px"><span style="background:linear-gradient(135deg,var(--c1),var(--c3));color:#fff;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;padding:4px 12px;border-radius:16px">Niv. ${lv.n}</span><span style="font-size:13px;color:var(--mt)"><b style="color:var(--c2)">${S.xp}</b>/${lv.x}</span></div>${barH(pct, null, 8)}<div style="margin-top:10px;font-size:14px;color:var(--mt)">🏆 <b style="color:var(--c3)">${lv.t}</b></div></div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">${[['🔥'+S.str,'Série','var(--c1)'],[S.done.length+'/'+L.length,'Leçons','var(--c2)'],[prec+'%','Précision','var(--c5)'],[S.sb+'','Speed','var(--c3)']].map(([v,l,c])=>`<div class="card" style="border-radius:16px;padding:14px;text-align:center"><div style="font-family:'Plus Jakarta Sans',sans-serif;font-size:22px;font-weight:700;color:${c};letter-spacing:0.03em">${v}</div><div style="font-size:11px;color:var(--mt);text-transform:uppercase;letter-spacing:.7px;margin-top:5px;font-weight:600">${l}</div></div>`).join('')}</div>
<div class="card" style="margin-bottom:14px"><h3 class="hd" style="font-size:15px;margin-bottom:12px">🎯 Compétences</h3>${skills.map(s=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><div style="font-size:13px;color:var(--mt);width:110px">${s.n}</div><div style="flex:1">${barH(s.v,s.c,8)}</div><div style="font-size:12px;color:var(--mt);width:34px;text-align:right">${s.v}%</div></div>`).join('')}</div>
${hard.length?`<div class="card" style="margin-bottom:14px"><h3 class="hd" style="font-size:15px;margin-bottom:12px">😰 À revoir</h3><div style="display:flex;flex-wrap:wrap;gap:6px">${hard.map(([w])=>`<span style="padding:6px 12px;border-radius:10px;font-size:12px;font-weight:600;background:rgba(255,61,107,.1);border:1px solid rgba(255,61,107,.2);color:var(--c1)">${w}</span>`).join('')}</div></div>`:''}
<button style="display:block;margin:16px auto;padding:14px 24px;border-radius:14px;border:1px solid rgba(0,212,255,.3);background:rgba(0,212,255,.06);color:var(--c2);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit" onclick="spk('¡Hola che! El audio funciona bárbaro.')">🔊 Tester le son</button>
<button style="display:block;margin:16px auto;padding:12px 20px;border-radius:12px;border:1px solid rgba(255,61,107,.25);background:rgba(255,61,107,.06);color:var(--c1);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit" onclick="showModal('Réinitialiser ?','Progression effacée.','Reset',()=>{localStorage.removeItem('pa7');S={...DS,ob:true};save();go('home')})">Réinitialiser</button>
</div></div>`}

// ══ PWA — Service Worker + Install Prompt ══
let _installPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();_installPrompt=e});

if('serviceWorker' in navigator){
  const swCode=`
    const CACHE='portenoar-v2';
    self.addEventListener('install',e=>{self.skipWaiting()});
    self.addEventListener('activate',e=>{e.waitUntil(clients.claim())});
    self.addEventListener('fetch',e=>{
      if(e.request.url.includes('translate_tts')||e.request.url.includes('translate.googleapis')){
        e.respondWith(fetch(e.request).catch(()=>caches.match(e.request)));
      } else {
        e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(resp=>{
          if(resp.ok){const c=resp.clone();caches.open(CACHE).then(cache=>cache.put(e.request,c))}
          return resp;
        }).catch(()=>new Response('Offline',{status:503}))));
      }
    });
  `;
  const swBlob=new Blob([swCode],{type:'application/javascript'});
  const swUrl=URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swUrl,{scope:'/'}).catch(()=>{});
}

function showInstallBtn(){
  if(!_installPrompt)return'';
  return `<button style="margin-top:16px;padding:16px 28px;border-radius:16px;border:none;background:linear-gradient(135deg,var(--c5),var(--c2));color:#07071A;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit" onclick="doInstall()">📲 Installer l'app</button>`;
}
function doInstall(){if(_installPrompt){_installPrompt.prompt();_installPrompt.userChoice.then(()=>{_installPrompt=null})}}

// ══ INIT ══
load();initV();render();
</script></body></html>
